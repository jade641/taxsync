version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: taxsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: taxsync_password
      MYSQL_DATABASE: TaxsyncDB
      MYSQL_USER: taxsync_user
      MYSQL_PASSWORD: taxsync_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/TaxsyncDB.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taxsync-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxsync-backend
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=TaxsyncDB;User=root;Password=taxsync_password;
      - Jwt__Key=your-super-secret-key-min-32-characters-long-for-security-purposes
      - Jwt__Issuer=TaxSync
      - Jwt__Audience=TaxSyncUsers
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taxsync-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: taxsync-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taxsync-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  taxsync-network:
    driver: bridge
